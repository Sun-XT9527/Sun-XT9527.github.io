<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>硕鼠</h1>
            <p class="author">[先秦] 《诗经·魏风》</p>

            <div class="content">
                <p>硕鼠硕鼠，无食我黍！</p>
                <p>三岁贯女，莫我肯顾。</p>
                <p>逝将去女，适彼乐土。</p>
                <p>乐土乐土，爰得我所。</p>
                <p>硕鼠硕鼠，无食我麦！</p>
                <p>三岁贯女，莫我肯德。</p>
                <p>逝将去女，适彼乐国。</p>
                <p>乐国乐国，爰得我直。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">逝将去女，适彼乐郊</span>"表达了劳动者对剥削者的控诉和对美好生活的向往。诗人以大老鼠比喻贪婪的剥削者，发誓要离开他们，去寻找没有剥削的"乐土"。
                </p>
            </div>
        </div>
    </div>
</body>
