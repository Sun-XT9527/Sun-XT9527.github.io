<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>宫中行乐词八首（其一）</h1>
            <p class="author">[唐] 李白</p>

            <div class="content">
                <p>小小生金屋，盈盈在紫微。</p>
                <p>山花插宝髻，石竹绣罗衣。</p>
                <p>每出深宫里，常随步辇归。</p>
                <p>只愁歌舞散，化作彩云飞。</p>
            </div>

            <div class="content" style="margin-top: 20px;">
                <p><em>其二</em></p>
                <p>柳色黄金嫩，梨花白雪香。</p>
                <p>玉楼巢翡翠，金殿锁鸳鸯。</p>
                <p>选妓随雕辇，征歌出洞房。</p>
                <p>宫中谁第一，飞燕在昭阳。</p>
            </div>

            <div class="content" style="margin-top: 20px;">
                <p><em>其三</em></p>
                <p>卢橘为秦树，蒲桃出汉宫。</p>
                <p>烟花宜落日，丝管醉春风。</p>
                <p>笛奏龙吟水，箫鸣凤下空。</p>
                <p>君王多乐事，还与万方同。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">笛奏龙吟水，箫鸣凤下空</span>"描绘了宫中音乐的盛况。笛声如龙在水中吟唱，箫声如凤凰从天而降，以神话意象渲染宫廷音乐的华美与超凡。</p>
            </div>
        </div>
    </div>
</body>
