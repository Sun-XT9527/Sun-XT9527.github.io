<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>冉冉孤生竹</h1>
            <p class="author">[汉] 佚名</p>

            <div class="content">
                <p>冉冉孤生竹，结根泰山阿。</p>
                <p>与君为新婚，菟丝附女萝。</p>
                <p>菟丝生有时，夫妇会有宜。</p>
                <p>千里远结婚，悠悠隔山陂。</p>
                <p>思君令人老，轩车来何迟！</p>
                <p>伤彼蕙兰花，含英扬光辉。</p>
                <p>过时而不采，将随秋草萎。</p>
                <p>君亮执高节，贱妾亦何为！</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span
                        class="highlight">思君令人老，轩车来何迟</span>"表达了思妇对远行丈夫的深切思念。思念让人憔悴衰老，而丈夫的车马为何迟迟不来？道出了古代女子对爱情的忠贞与等待的煎熬。
                </p>
            </div>
        </div>
    </div>
</body>
