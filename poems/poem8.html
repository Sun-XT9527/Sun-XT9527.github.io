<body>
    <div class="container">
        <a href="../index_teaching.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>书院二小松</h1>
            <p class="author">[唐] 李群玉</p>

            <div class="content">
                <p>一双幽色出凡尘，数粒秋烟二尺鳞。</p>
                <p>从此静窗闻细韵，琴声长伴读书人。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">一双幽色出凡尘，数粒秋烟二尺鳞</span>"描绘了书院中两棵小松树的清雅姿态。"幽色出凡尘"写松色青翠超凡，"秋烟"喻松针茂密如烟，"二尺鳞"形容树干矮小如鳞片，生动刻画了小松的清秀之态。</p>
            </div>
        </div>
    </div>
