    <style>

        }

<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>残春旅舍</h1>
            <p class="author">[唐] 韩偓</p>

            <div class="content">
                <p>旅舍残春宿雨晴，恍然心地忆咸京。</p>
                <p>树头蜂抱花须落，池面鱼吹柳絮行。</p>
                <p>禅伏诗魔归净域，酒冲愁阵出奇兵。</p>
                <p>两梁免被尘埃污，拂拭朝簪待眼明。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">树头蜂抱花须落，池面鱼吹柳絮行</span>"描绘了暮春时节的细腻景象：蜜蜂抱着花须飞舞，鱼儿在池面吞吐柳絮，生动传神地表现了春天将尽时的自然景致。
                </p>
            </div>
        </div>
    </div>
</body>
