        <div class="poem-card">
            <h1>吕氏春秋·览·有始览</h1>
            <p class="author">[秦] 吕不韦 编</p>

            <div class="content">
                <p>《吕氏春秋》是秦国丞相吕不韦主编的一部古代类百科全书似的传世巨著，</p>
                <p>有八览、六论、十二纪，共二十多万言。</p>
            </div>

            <div class="content" style="margin-top: 20px;">
                <p><em>原文节选：</em></p>
                <p>天地有始，天微以成，地塞以形。</p>
                <p>天地合和，生之大经也。</p>
                <p>以寒暑日月昼夜知之，</p>
                <p>以殊形殊能异宜说之。</p>
                <p>夫物合而成，离而生。</p>
                <p>知合知成，知离知生，则天地之理得矣。</p>
            </div>

            <div class="content" style="margin-top: 20px;">
                <p>井中之无大鱼也，新林之无长木也。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">井中之无大鱼也，新林之无长木也</span>"比喻环境对事物发展的限制。井中不会有大鱼，新栽的树林不会有高大的树木，说明环境狭小或时间不足，都难以成就大事。</p>
            </div>
        </div>
