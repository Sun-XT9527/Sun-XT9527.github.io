<body>
    <div class="container">
        <a href="../index_teaching.html" class="back-link">← 返回名句列表</a>

        <div class="poem-card">
            <h1>节节高·题洞庭鹿角庙壁</h1>
            <p class="author">[元] 卢挚</p>

            <div class="content">
                <p>雨晴云散，满江明月。</p>
                <p>风微浪息，扁舟一叶。</p>
                <p>半夜心，三生梦，万里别。</p>
                <p>闷倚篷窗睡些。</p>
            </div>

            <div class="note">
                <h3>名句赏析</h3>
                <p>"<span class="highlight">半夜心，三生梦，万里别</span>"以简练的语言表达了深沉的离愁别绪。半夜难眠的心情，三生三世的梦境，万里之遥的离别，层层递进地展现了游子的孤独与思乡之情。</p>
            </div>
        </div>
    </div>
